# Identity score component weights (must sum to 1.0)
weights:
  ca_policy: 0.30
  mfa: 0.25
  privileged_access: 0.20
  risk_posture: 0.10
  app_governance: 0.10
  guest: 0.05

# Per-domain scoring parameters
ca_policy:
  enforced_weight: 1.0
  report_only_weight: 0.3
  disabled_weight: 0.0
  missing_weight: 0.0

severity_caps:
  # If active_exposure is False, cap severity at this level
  # unless the control is marked as foundationally_critical
  no_exposure_max: "high"

foundationally_critical:
  # Controls where missing = critical regardless of active_exposure
  - "CA-001"   # Require MFA for all users
  - "CA-002"   # Block legacy authentication
  - "CA-005"   # Require MFA for admins
